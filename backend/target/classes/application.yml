spring:
  application:
    name: cours-particuliers-api

  datasource:
    url: jdbc:postgresql://localhost:5432/cours_particuliers
    username: postgres
    password: rachid
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:MaCleSecreteTresLonguePourSignerLesTokensJWT1234567890ABCDEF}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  upload:
    dir: uploads/profils

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.coursparticuliers: INFO
